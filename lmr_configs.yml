# Archive / ptype whitelist — matches PReSto2k's coverage. cfr assigns a
# Linear PSM with [tas] input by default for ptypes not in ptype_psm_dict,
# so the five extra archives (marine, sclerosponge, speleothem, borehole,
# documents, hybrid) calibrate on tas alone. Records that fail PSM
# calibration (too little instrumental overlap) drop out naturally.
filter_proxydb_kwargs:
  by: ptype
  keys:
  - coral
  - tree
  - ice
  - lake
  - bivalve
  - marine
  - sclerosponge
  - speleothem
  - borehole
  - documents
  - hybrid
